services:
  - type: web
    name: agentic-wallet-api
    runtime: node
    repo: https://github.com/GodlyDeveloper1/agentic-wallet-challenge
    plan: free
    buildCommand: npm install && npm run build:backend
    startCommand: npm run server
    envVars:
      - key: NODE_ENV
        value: production
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: MASTER_PASSWORD
        value: MasterPassword123!
      - key: NODE_VERSION
        value: 20.20.0